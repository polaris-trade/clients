name: fuzz

# Framing fuzz targets for the moldudp and soupbintcp wire codecs. check builds
# and replays the committed corpus on PRs touching wire or fuzz sources
# (required gate). discover runs a time-bounded search only when wire or fuzz
# code lands on main, plus manual dispatch (advisory) - no blind schedule.
# Public repo: GitHub-hosted Linux, free minutes.

on:
  pull_request:
    paths:
      - 'crates/moldudp/src/**'
      - 'crates/soupbintcp/src/**'
      - 'fuzz/**'
  push:
    branches: [main]
    paths:
      - 'crates/moldudp/src/**'
      - 'crates/soupbintcp/src/**'
      - 'fuzz/**'
  workflow_dispatch:

jobs:
  check:
    if: github.event_name == 'pull_request'
    uses: polaris-trade/ci/.github/workflows/rust-fuzz.yml@main
    with:
      mode: check
      advisory: false

  discover:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    uses: polaris-trade/ci/.github/workflows/rust-fuzz.yml@main
    with:
      mode: discover
