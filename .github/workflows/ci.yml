name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    uses: polaris-trade/ci/.github/workflows/rust-ci.yml@main

  # Powerset covers soupbintcp compressed/tokio combos: {}, compressed, tokio,
  # both. Nextest line keeps cfg-gated integration tests (tests/compressed.rs,
  # tests/managed.rs) running now the full-matrix leg is gone.
  rust-features:
    uses: polaris-trade/ci/.github/workflows/rust-features.yml@main
    with:
      hack-args: -p client_soupbintcp --feature-powerset
      extra-commands: |
        cargo check --workspace --all-features --all-targets
        cargo nextest run --workspace --all-features
      install-nextest: true
